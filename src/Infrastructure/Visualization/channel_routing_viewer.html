<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Channel Routing — Analysis Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0c10;
    --surface:   #111318;
    --surface2:  #181c24;
    --border:    #252a35;
    --accent:    #00e5a0;
    --accent2:   #7b61ff;
    --warn:      #ff5f5f;
    --text:      #e2e8f0;
    --muted:     #6b7a99;
    --track-h:   28px;
    --col-w:     36px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 24px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  header .subtitle {
    color: var(--muted);
    font-size: 11px;
    padding-bottom: 3px;
  }
  .badge {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--muted);
  }
  .badge span { color: var(--text); }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: calc(100vh - 77px);
  }

  /* ── Sidebar ── */
  .sidebar {
    grid-row: 1 / 3;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* Metric cards */
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .metric {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    transition: border-color .2s;
  }
  .metric:hover { border-color: var(--accent); }
  .metric-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .metric-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); }
  .metric-value.warn { color: var(--warn); }
  .metric-sub { font-size: 9px; color: var(--muted); margin-top: 2px; }

  /* Comparison table */
  .compare-table { width: 100%; border-collapse: collapse; }
  .compare-table th {
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); text-align: left; padding: 0 0 8px;
  }
  .compare-table td { padding: 8px 0; border-top: 1px solid var(--border); }
  .compare-table tr:first-child td { border-top: none; }
  .algo-name { font-size: 11px; color: var(--text); }
  .algo-val { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; }
  .better { color: var(--accent); }
  .worse  { color: var(--muted); }
  .winner-badge {
    display: inline-block;
    background: rgba(0,229,160,.12);
    color: var(--accent);
    border: 1px solid rgba(0,229,160,.3);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 9px;
    letter-spacing: 1px;
  }

  /* Net legend */
  .net-list { display: flex; flex-direction: column; gap: 5px; max-height: 200px; overflow-y: auto; }
  .net-item { display: flex; align-items: center; gap: 8px; }
  .net-swatch {
    width: 24px; height: 6px; border-radius: 3px; flex-shrink: 0;
  }
  .net-info { font-size: 10px; color: var(--muted); }
  .net-info span { color: var(--text); }

  /* Controls */
  .ctrl-group { display: flex; flex-direction: column; gap: 8px; }
  .ctrl-row { display: flex; gap: 8px; }
  .btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: rgba(0,229,160,.1);
    border-color: rgba(0,229,160,.4);
    color: var(--accent);
  }

  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-label { font-size: 10px; color: var(--muted); white-space: nowrap; }
  #zoomVal { font-size: 10px; color: var(--accent); width: 36px; text-align: right; }

  /* ── Toolbar ── */
  .toolbar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }
  .toolbar-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  .algo-tabs { display: flex; gap: 4px; }
  .algo-tab {
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all .15s;
  }
  .algo-tab.active {
    background: rgba(0,229,160,.1);
    border-color: rgba(0,229,160,.5);
    color: var(--accent);
  }

  .pos-info {
    margin-left: auto;
    font-size: 10px;
    color: var(--muted);
  }
  .pos-info span { color: var(--text); }

  /* ── Canvas area ── */
  .canvas-wrap {
    position: relative;
    overflow: hidden;
    flex: 1;
    min-height: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(0,229,160,.03) 0%, transparent 60%),
      var(--bg);
    cursor: grab;
  }
  .canvas-wrap:active { cursor: grabbing; }
  #mainCanvas { display: block; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
    pointer-events: none;
    display: none;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  #tooltip .tip-net { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  #tooltip .tip-row { color: var(--muted); }
  #tooltip .tip-row span { color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Channel Routing</h1>
    <div class="subtitle">Detailed routing analysis · VLSI CAD</div>
  </div>
  <div class="badge">Width: <span id="hdrWidth">—</span> &nbsp;|&nbsp; Nets: <span id="hdrNets">—</span></div>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div class="section">
      <div class="section-title">Active Algorithm</div>
      <div class="metrics-grid" id="metricsGrid">
        <div class="metric"><div class="metric-label">Tracks</div><div class="metric-value" id="mTracks">—</div></div>
        <div class="metric"><div class="metric-label">Wire Length</div><div class="metric-value" id="mWire">—</div></div>
        <div class="metric"><div class="metric-label">Conflicts</div><div class="metric-value" id="mConflicts">—</div></div>
        <div class="metric"><div class="metric-label">Time</div><div class="metric-value" id="mTime">—</div><div class="metric-sub" id="mTimeSub"></div></div>
      </div>
    </div>

    <div class="section" id="compareSection" style="display:none">
      <div class="section-title">Algorithm Comparison</div>
      <table class="compare-table" id="compareTable"></table>
    </div>

    <div class="section">
      <div class="section-title">Controls</div>
      <div class="ctrl-group">
        <div class="slider-row">
          <span class="slider-label">Zoom</span>
          <input type="range" id="zoomSlider" min="5" max="200" value="100">
          <span id="zoomVal">1×</span>
        </div>
        <div class="ctrl-row">
          <button class="btn" onclick="resetView()">⌖ Reset</button>
          <button class="btn" onclick="fitToScreen()">⤢ Fit</button>
        </div>
        <div class="ctrl-row">
          <button class="btn" onclick="scrollToStart()">|◄ Start</button>
          <button class="btn" onclick="scrollToEnd()">End ►|</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Net Legend</div>
      <div class="net-list" id="netLegend">—</div>
    </div>

  </aside>

  <!-- ── Main area ── -->
  <div style="display:flex;flex-direction:column;overflow:hidden;grid-row:1/3;min-height:0;">

    <div class="toolbar">
      <span class="toolbar-label">View</span>
      <div class="algo-tabs" id="algoTabs"></div>
      <div class="pos-info">Col: <span id="posCol">—</span> &nbsp; Track: <span id="posTrack">—</span></div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="mainCanvas"></canvas>
    </div>

  </div>
</div>

<div id="tooltip">
  <div class="tip-net" id="tipNet"></div>
  <div class="tip-row">Columns: <span id="tipCols"></span></div>
  <div class="tip-row">Track: <span id="tipTrack"></span></div>
  <div class="tip-row">Length: <span id="tipLen"></span></div>
</div>

<script>
// ════════════════════════════════════════════════
//  DATA  (replaced by C# when generating the file)
// ════════════════════════════════════════════════
const ROUTING_DATA = __ROUTING_DATA__;

// ════════════════════════════════════════════════
//  PALETTE
// ════════════════════════════════════════════════
const PALETTE = [
  '#00e5a0','#7b61ff','#ff9f43','#54a0ff','#ff6b6b',
  '#ffd32a','#0be881','#f8b739','#c56cf0','#18dcff',
  '#ff4d4d','#3ae374','#ffdd59','#67e480','#e056fd',
  '#ff9ff3','#54e346','#ff793f','#d63031','#6c5ce7',
];
const netColor = id => PALETTE[(id - 1) % PALETTE.length];

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let activeIdx  = 0;
let camX       = 0;   // pixels scrolled
let camY       = 0;
let zoom       = 1.0;
let dragging   = false;
let dragStartX = 0;
let dragStartY = 0;
let dragCamX   = 0;
let dragCamY   = 0;

const COL_W_BASE   = 36;
const TRACK_H_BASE = 28;
const LABEL_W      = 48;
const LABEL_H      = 28;

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
const canvas = document.getElementById('mainCanvas');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvasWrap');

function init() {
  document.getElementById('hdrWidth').textContent = ROUTING_DATA.width.toLocaleString();
  document.getElementById('hdrNets').textContent  = ROUTING_DATA.nets.toLocaleString();

  buildAlgoTabs();
  buildCompareTable();
  buildNetLegend();
  updateSidebarMetrics();
  resizeCanvas();
  render();
}

// ── Tabs ──
function buildAlgoTabs() {
  const tabs = document.getElementById('algoTabs');
  tabs.innerHTML = '';
  ROUTING_DATA.results.forEach((r, i) => {
    const b = document.createElement('button');
    b.className = 'algo-tab' + (i === activeIdx ? ' active' : '');
    b.textContent = r.algorithmName;
    b.onclick = () => { activeIdx = i; refreshActive(); };
    tabs.appendChild(b);
  });
}

function refreshActive() {
  document.querySelectorAll('.algo-tab').forEach((t,i) => t.classList.toggle('active', i===activeIdx));
  updateSidebarMetrics();
  render();
}

// ── Sidebar metrics ──
function updateSidebarMetrics() {
  const r = ROUTING_DATA.results[activeIdx];
  document.getElementById('mTracks').textContent    = r.tracksUsed;
  document.getElementById('mWire').textContent      = r.wireLength.toLocaleString(undefined,{maximumFractionDigits:0});
  const cEl = document.getElementById('mConflicts');
  cEl.textContent = r.conflictCount;
  cEl.className   = 'metric-value' + (r.conflictCount > 0 ? ' warn' : '');
  const ms = r.executionMs;
  const timeEl  = document.getElementById('mTime');
  const timeSub = document.getElementById('mTimeSub');
  if (ms < 1000) { timeEl.textContent = ms.toFixed(2); timeSub.textContent = 'ms'; }
  else           { timeEl.textContent = (ms/1000).toFixed(2); timeSub.textContent = 'sec'; }
}

// ── Comparison table ──
function buildCompareTable() {
  if (ROUTING_DATA.results.length < 2) return;
  document.getElementById('compareSection').style.display = '';
  const tbl = document.getElementById('compareTable');
  const rs  = ROUTING_DATA.results;

  const minTracks = Math.min(...rs.map(r => r.tracksUsed));
  const minWire   = Math.min(...rs.map(r => r.wireLength));
  const minTime   = Math.min(...rs.map(r => r.executionMs));

  let html = '<tr><th>Algorithm</th><th>Tracks</th><th>Wire</th><th>ms</th></tr>';
  rs.forEach(r => {
    const tb = r.tracksUsed === minTracks ? 'better' : 'worse';
    const wb = r.wireLength === minWire   ? 'better' : 'worse';
    const tmb= r.executionMs=== minTime   ? 'better' : 'worse';
    const winner = r.tracksUsed === minTracks ? '<span class="winner-badge">★ BEST</span>' : '';
    html += `<tr>
      <td><div class="algo-name">${r.algorithmName}</div>${winner}</td>
      <td><div class="algo-val ${tb}">${r.tracksUsed}</div></td>
      <td><div class="algo-val ${wb}">${r.wireLength.toLocaleString(undefined,{maximumFractionDigits:0})}</div></td>
      <td><div class="algo-val ${tmb}">${r.executionMs.toFixed(1)}</div></td>
    </tr>`;
  });
  tbl.innerHTML = html;
}

// ── Net legend ──
function buildNetLegend() {
  const r   = ROUTING_DATA.results[0];
  const ids = [...new Set(r.segments.filter(s=>s.type===0).map(s=>s.netId))].sort((a,b)=>a-b);
  const el  = document.getElementById('netLegend');
  el.innerHTML = ids.slice(0, 40).map(id => {
    const segs = r.segments.filter(s => s.netId===id && s.type===0);
    const span = segs.length ? segs[0].end - segs[0].start : 0;
    return `<div class="net-item">
      <div class="net-swatch" style="background:${netColor(id)}"></div>
      <div class="net-info">Net <span>${id}</span> · span ${span}</div>
    </div>`;
  }).join('') + (ids.length > 40 ? `<div class="net-info" style="margin-top:6px">…and ${ids.length-40} more</div>` : '');
}

// ════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════
function resizeCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}

function render() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const r  = ROUTING_DATA.results[activeIdx];
  const cw = COL_W_BASE   * zoom;
  const th = TRACK_H_BASE * zoom;
  const lw = LABEL_W;
  const lh = LABEL_H;

  const totalTracks = r.tracksUsed;
  const totalCols   = ROUTING_DATA.width;

  // Visible column range
  const colStart = Math.max(0, Math.floor((camX) / cw));
  const colEnd   = Math.min(totalCols - 1, Math.ceil((camX + W - lw) / cw));

  // Background
  ctx.fillStyle = '#0a0c10';
  ctx.fillRect(0, 0, W, H);

  // ── Grid ──
  ctx.strokeStyle = '#1a1f2b';
  ctx.lineWidth = 1;
  for (let t = 0; t <= totalTracks + 2; t++) {
    const y = lh + t * th - camY;
    if (y < 0 || y > H) continue;
    ctx.beginPath(); ctx.moveTo(lw, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // ── Track labels ──
  ctx.fillStyle = '#252a35';
  ctx.fillRect(0, 0, lw - 1, H);
  ctx.strokeStyle = '#252a35';
  ctx.beginPath(); ctx.moveTo(lw, 0); ctx.lineTo(lw, H); ctx.stroke();

  ctx.font = `bold ${Math.max(9, 11*zoom)}px 'Space Mono', monospace`;
  ctx.textAlign = 'center';

  const drawLabel = (text, y, color) => {
    if (y < -20 || y > H + 20) return;
    ctx.fillStyle = color;
    ctx.fillText(text, lw/2, y + th/2 + 4);
  };

  drawLabel('T', lh + 0     - camY - th, '#6b7a99');
  drawLabel('B', lh + (totalTracks+1)*th - camY, '#6b7a99');
  for (let t = 0; t < totalTracks; t++) {
    drawLabel(String(t), lh + (t+1)*th - camY, '#404960');
  }

  // ── Segments ──
  r.segments.forEach(seg => {
    if (seg.end < colStart || seg.start > colEnd) return;

    const color = netColor(seg.netId);

    if (seg.type === 0) { // Horizontal
      const x1 = lw + (seg.start - colStart) * cw + cw * 0.1;
      const x2 = lw + (seg.end   - colStart) * cw + cw * 0.9;
      const y  = lh + (seg.track + 1) * th - camY + th / 2;
      if (y < 0 || y > H) return;

      // Track fill
      ctx.globalAlpha = 0.12;
      ctx.fillStyle = color;
      ctx.fillRect(x1, lh + (seg.track+1)*th - camY + 2, x2-x1, th - 4);
      ctx.globalAlpha = 1;

      // Main line
      ctx.strokeStyle = color;
      ctx.lineWidth   = Math.max(2, 4 * zoom);
      ctx.lineCap     = 'round';
      ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();

      // Label (only when zoomed enough)
      if (zoom > 0.4 && cw * (seg.end - seg.start + 1) > 24) {
        ctx.font      = `${Math.max(8, 10*zoom)}px 'Space Mono', monospace`;
        ctx.fillStyle = color;
        ctx.textAlign = 'center';
        const cx = (x1 + x2) / 2;
        ctx.fillText(seg.netId, cx, y - Math.max(3, 5*zoom));
      }
    } else { // Vertical via
      const x  = lw + (seg.start - colStart) * cw + cw / 2;
      const y1 = lh - camY + th / 2;
      const y2 = lh + (seg.track + 1) * th - camY + th / 2;
      const y3 = lh + (totalTracks + 1) * th - camY + th / 2;
      if (x < lw || x > W) return;

      ctx.strokeStyle = color;
      ctx.lineWidth   = Math.max(1, 2 * zoom);
      ctx.setLineDash([4 * zoom, 3 * zoom]);
      ctx.lineCap = 'round';

      if (y1 > 0 && y1 < H || y2 > 0 && y2 < H) {
        ctx.beginPath(); ctx.moveTo(x, Math.max(0, y1)); ctx.lineTo(x, Math.min(H, y2)); ctx.stroke();
      }
      if (y2 > 0 && y2 < H || y3 > 0 && y3 < H) {
        ctx.beginPath(); ctx.moveTo(x, Math.max(0, y2)); ctx.lineTo(x, Math.min(H, y3)); ctx.stroke();
      }
      ctx.setLineDash([]);
    }
  });

  // ── Contacts ──
  const drawContacts = (row, trackY) => {
    for (let c = colStart; c <= colEnd; c++) {
      if (row[c] === 0) continue;
      const id  = row[c];
      const x   = lw + (c - colStart) * cw + cw / 2;
      const y   = trackY;
      const r2  = Math.max(4, 7 * zoom);
      ctx.fillStyle   = netColor(id);
      ctx.strokeStyle = '#0a0c10';
      ctx.lineWidth   = 2;
      ctx.beginPath(); ctx.arc(x, y, r2, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      if (zoom > 0.5) {
        ctx.font      = `bold ${Math.max(7, 9*zoom)}px 'Space Mono', monospace`;
        ctx.fillStyle = '#0a0c10';
        ctx.textAlign = 'center';
        ctx.fillText(id, x, y + Math.max(2.5, 3.5*zoom));
      }
    }
  };
  drawContacts(ROUTING_DATA.topRow,    lh - camY + th/2);
  drawContacts(ROUTING_DATA.bottomRow, lh + (totalTracks+1)*th - camY + th/2);

  // ── Column numbers (when zoomed in) ──
  if (zoom > 0.6) {
    ctx.font      = `${Math.max(8, 9*zoom)}px 'Space Mono', monospace`;
    ctx.fillStyle = '#2e3650';
    ctx.textAlign = 'center';
    const step = zoom > 1.2 ? 1 : zoom > 0.8 ? 5 : 10;
    for (let c = colStart; c <= colEnd; c++) {
      if (c % step !== 0) continue;
      const x = lw + (c - colStart) * cw + cw/2;
      ctx.fillText(c, x, 14);
    }
  }

  // ── Scrollbar ──
  drawScrollbar(totalCols, cw, W, H);
}

function drawScrollbar(totalCols, cw, W, H) {
  const totalW   = totalCols * cw;
  const trackW   = W - LABEL_W;
  if (totalW <= trackW) return;
  const ratio    = trackW / totalW;
  const thumbW   = Math.max(30, trackW * ratio);
  const thumbX   = LABEL_W + (camX / totalW) * trackW;

  ctx.fillStyle   = 'rgba(37,42,53,0.8)';
  ctx.fillRect(LABEL_W, H - 8, trackW, 8);
  ctx.fillStyle   = 'rgba(0,229,160,0.35)';
  ctx.beginPath();
  ctx.roundRect(thumbX, H - 7, thumbW, 6, 3);
  ctx.fill();
}

// ════════════════════════════════════════════════
//  INTERACTION
// ════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx   = e.clientX - rect.left;
  const my   = e.clientY - rect.top;

  const cw = COL_W_BASE * zoom;
  const th = TRACK_H_BASE * zoom;
  const col   = Math.floor((mx - LABEL_W + camX) / cw);
  const track = Math.floor((my - LABEL_H + camY) / th) - 1;

  document.getElementById('posCol').textContent   = col >= 0 && col < ROUTING_DATA.width ? col : '—';
  document.getElementById('posTrack').textContent = track >= 0 ? track : '—';

  // Hit-test
  const r = ROUTING_DATA.results[activeIdx];
  const hit = r.segments.find(s =>
    s.type === 0 &&
    col >= s.start && col <= s.end && track === s.track
  );
  if (hit) {
    document.getElementById('tipNet').textContent   = `Net ${hit.netId}`;
    document.getElementById('tipNet').style.color   = netColor(hit.netId);
    document.getElementById('tipCols').textContent  = `${hit.start} – ${hit.end}`;
    document.getElementById('tipTrack').textContent = hit.track;
    document.getElementById('tipLen').textContent   = (hit.end - hit.start) + ' units';
    tooltip.style.display = 'block';
    tooltip.style.left    = (e.clientX + 14) + 'px';
    tooltip.style.top     = (e.clientY - 10) + 'px';
  } else {
    tooltip.style.display = 'none';
  }

  if (dragging) {
    camX = Math.max(0, dragCamX - (e.clientX - dragStartX));
    camY = Math.max(0, dragCamY - (e.clientY - dragStartY));
    render();
  }
});

canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
canvas.addEventListener('mousedown',  e => {
  dragging = true; dragStartX = e.clientX; dragStartY = e.clientY;
  dragCamX = camX; dragCamY = camY;
});
canvas.addEventListener('mouseup',   () => dragging = false);

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect  = canvas.getBoundingClientRect();
  const mx    = e.clientX - rect.left;
  const factor = e.deltaY < 0 ? 1.12 : 0.89;
  const oldZoom = zoom;
  zoom = Math.min(4, Math.max(0.05, zoom * factor));

  // Zoom toward mouse
  const colAtMouse = (mx - LABEL_W + camX) / (COL_W_BASE * oldZoom);
  camX = Math.max(0, colAtMouse * COL_W_BASE * zoom - (mx - LABEL_W));

  document.getElementById('zoomSlider').value = zoom * 100;
  document.getElementById('zoomVal').textContent = zoom.toFixed(2) + '×';
  render();
}, { passive: false });

document.getElementById('zoomSlider').addEventListener('input', function() {
  zoom = this.value / 100;
  document.getElementById('zoomVal').textContent = zoom.toFixed(2) + '×';
  render();
});

// Touch support
let lastTouchDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true; dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    dragCamX = camX; dragCamY = camY;
  }
  if (e.touches.length === 2) lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    camX = Math.max(0, dragCamX - (e.touches[0].clientX - dragStartX));
    camY = Math.max(0, dragCamY - (e.touches[0].clientY - dragStartY));
    render();
  }
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (lastTouchDist) zoom = Math.min(4, Math.max(0.05, zoom * (d / lastTouchDist)));
    lastTouchDist = d;
    render();
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; lastTouchDist = null; });

window.addEventListener('resize', () => { resizeCanvas(); render(); });

// ── Controls ──
function resetView() {
  camX = 0; camY = 0; zoom = 1;
  document.getElementById('zoomSlider').value = 100;
  document.getElementById('zoomVal').textContent = '1.00×';
  render();
}
function fitToScreen() {
  const r  = ROUTING_DATA.results[activeIdx];
  const W  = canvas.width - LABEL_W;
  const H  = canvas.height - LABEL_H;
  const zx = W / (ROUTING_DATA.width * COL_W_BASE);
  const zy = H / ((r.tracksUsed + 2) * TRACK_H_BASE);
  zoom = Math.min(zx, zy, 4);
  camX = 0; camY = 0;
  document.getElementById('zoomSlider').value = zoom * 100;
  document.getElementById('zoomVal').textContent = zoom.toFixed(2) + '×';
  render();
}
function scrollToStart() { camX = 0; render(); }
function scrollToEnd()   { camX = Math.max(0, ROUTING_DATA.width * COL_W_BASE * zoom - (canvas.width - LABEL_W)); render(); }

init();
fitToScreen();
</script>
</body>
</html>
